.top{display:flex;align-items:center;justify-content:space-between;min-height:38px;gap:10px}.back,.skip,.chip{border:1px solid rgba(255,255,255,.18);background:rgba(5,5,7,.55);padding:10px 12px;color:var(--soft);font-size:10px;font-weight:800;letter-spacing:.22em;text-transform:uppercase;clip-path:polygon(0 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%)}.skip{border-color:transparent}.count{font-family:var(--mono);font-size:11px;letter-spacing:.18em;color:var(--soft)}.titlebar{text-align:center}.section-title{font-family:var(--mono);letter-spacing:.28em;color:var(--red);font-size:19px;font-weight:800;text-transform:uppercase;margin:0}.section-sub{font-family:var(--mono);letter-spacing:.22em;color:var(--muted);font-size:10px;text-transform:uppercase;margin-top:4px}

tline:none;font-size:16px}.timer{position:relative;flex:1;min-height:250px;display:grid;place-items:center;text-align:center;padding:20px;margin-top:10px;background:radial-gradient(circle,rgba(233,20,53,.14),rgba(0,0,0,.8) 63%)}.ring{position:absolute;width:220px;height:220px;border-radius:50%;border:2px solid rgba(255,255,255,.09)}.ring:before{content:"";position:absolute;inset:8px;border-radius:50%;border:8px solid rgba(233,20,53,.15);border-top-color:var(--red);border-right-color:rgba(233,20,53,.75);animation:spin 4.5s linear infinite}.ring:after{content:"";position:absolute;inset:42px;border-radius:50%;border:1px solid rgba(255,255,255,.12)}.timer .inside{position:relative;z-index:1}.timer .label{font-family:var(--mono);font-size:11px;color:var(--soft);letter-spacing:.28em;text-transform:uppercase}.timer .num{font-family:var(--mono);font-weight:900;font-size:62px;letter-spacing:-.08em;margin-top:12px;text-shadow:0 0 25px rgba(255,255,255,.2)}.timer .hint{font-family:var(--mono);font-size:10px;color:var(--soft);letter-spacing:.18em;text-transform:uppercase;margin-top:12px}.timer.go .num{font-size:84px;color:#fff;text-shadow:0 0 30px rgba(233,20,53,.65);animation:pulse 1.1s ease infinite}.timer.rest .ring:before{animation-duration:8s;border-top-color:rgba(255,255,255,.4);border-right-color:var(--red)}.actions{display:grid;gap:9px;margin-top:10px}.two{display:grid;grid-template-columns:1fr 1fr;gap:9px}.history{overflow:auto;display:grid;gap:10px;padding-bottom:12px}.hist{padding:14px;display:grid;grid-template-columns:1fr 74px;gap:10px}.hist .name{font-family:var(--mono);font-size:20px;font-weight:900;letter-spacing:.08em;text-transform:uppercase}.hist .date{font-family:var(--mono);font-size:9px;color:var(--soft);letter-spacing:.13em;text-transform:uppercase;margin-top:5px}.hist .small{font-family:var(--mono);font-size:10px;color:var(--soft);line-height:1.6;text-transform:uppercase}.stamp{font-family:var(--serif);font-size:42px;color:var(--red);text-align:right}.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}.statcard{padding:14px;min-height:120px}.statcard .label{font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--soft)}.statcard .value{font-family:var(--mono);font-size:28px;margin-top:10px;font-weight:900}.bars{display:flex;align-items:end;gap:5px;height:42px;margin-top:14px}.bars i{flex:1;background:linear-gradient(180deg,var(--red),rgba(233,20,53,.18));min-height:8px}.done-screen{flex:1;display:grid;place-items:center;text-align:center}.done-screen .mark{font-family:var(--serif);font-size:92px;color:var(--red);text-shadow:0 0 35px rgba(233,20,53,.65)}.done-screen h2{font-family:var(--mono);font-size:24px;letter-spacing:.12em;text-transform:uppercase}.done-screen p{font-family:var(--mono);font-size:11px;letter-spacing:.16em;line-height:1.8;color:var(--soft);text-transform:uppercase}.nav{position:fixed;z-index:5;left:0;right:0;bottom:0;height:calc(60px + var(--safe-bot));padding-bottom:var(--safe-bot);background:rgba(5,5,8,.92);border-top:1px solid rgba(255,255,255,.12);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);display:grid;grid-template-columns:repeat(4,1fr)}.nav button{font-family:var(--mono);font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--soft);display:grid;place-items:center;padding:8px 2px}.nav b{display:block;font-family:var(--serif);font-size:20px;color:inherit;line-height:1}.nav button.on{color:var(--red)}

.systems{flex:1;min-height:0;overflow:auto;display:flex;flex-direction:column;gap:14px;padding-bottom:8px}
.systems .sessions{overflow:visible;padding-bottom:0}
.syslabel{display:flex;align-items:center;gap:10px;padding:0 2px;margin-bottom:6px}
.syslabel-jp{font-family:var(--serif);font-size:20px;color:var(--red);text-shadow:0 0 12px rgba(233,20,53,.4);line-height:1}
.syslabel-tx{font-family:var(--mono);font-size:10px;letter-spacing:.28em;color:var(--soft);text-transform:uppercase;font-weight:800}
.syslabel-line{flex:1;height:1px;background:linear-gradient(90deg,rgba(233,20,53,.4),transparent)}
.today{position:relative;padding:0;overflow:hidden;border:1px solid rgba(255,255,255,.16);background:linear-gradient(160deg,rgba(19,20,25,.92),rgba(8,2,5,.92));margin:10px 0 14px;clip-path:polygon(14px 0,100% 0,100% calc(100% - 14px),calc(100% - 14px) 100%,0 100%,0 14px)}

.today:after{content:"";position:absolute;right:-50px;top:-50px;width:160px;height:160px;border-radius:50%;border:1px solid rgba(233,20,53,.16);pointer-events:none}
.today-head{padding:14px 16px 4px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px;position:relative;z-index:2}
.today-title{font-family:var(--mono);font-size:10px;letter-spacing:.32em;color:var(--red);text-transform:uppercase;font-weight:800}
.today-day{font-family:var(--mono);font-size:22px;letter-spacing:.05em;text-transform:uppercase;font-weight:900;margin-top:6px;line-height:1.04}
.today-jp{font-family:var(--serif);font-size:42px;color:rgba(233,20,53,.6);line-height:1;align-self:flex-start;text-shadow:0 0 18px rgba(233,20,53,.32)}
.day-tag{font-family:var(--mono);font-size:9px;letter-spacing:.18em;color:var(--muted);text-transform:uppercase;margin-top:5px}

.streak-num small{font-family:var(--mono);font-size:8px;letter-spacing:.22em;color:var(--soft);font-weight:800;text-transform:uppercase;display:block;margin-top:5px}
.streak-dots{display:flex;gap:6px;flex:1;justify-content:flex-end}

.dayDot.today{outline:1px solid rgba(233,20,53,.55);outline-offset:2px}
.dayDot.hard,.dayDot.gym{background:var(--red);border-color:var(--red);box-shadow:0 0 8px rgba(233,20,53,.55)}
.dayDot.busy{background:var(--gold);border-color:var(--gold);box-shadow:0 0 6px rgba(215,177,106,.4)}
.dayDot.dead{background:rgba(183,182,185,.45);border-color:rgba(183,182,185,.5)}
.dayDot.emergency{background:#2ee0c8;border-color:#2ee0c8;box-shadow:0 0 8px rgba(46,224,200,.5)}

.tbtn{padding:13px 8px;font-family:var(--mono);font-size:10px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px);text-align:center;line-height:1.25;border:0}

.tbtn.hard{background:linear-gradient(180deg,#d81834,#680914);color:#fff;box-shadow:inset 0 1px 0 rgba(255,255,255,.18),0 8px 22px rgba(233,20,53,.22)}
.tbtn.busy{background:linear-gradient(180deg,rgba(215,177,106,.18),rgba(215,177,106,.04));border:1px solid rgba(215,177,106,.55);color:var(--gold)}
.tbtn.dead{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.18);color:var(--soft)}

.tbtn:active{transform:translateY(1px)}
.streak-line{padding:14px 0 6px;font-family:var(--mono);font-size:10px;letter-spacing:.18em;color:var(--soft);text-transform:uppercase;text-align:center}
.streak-line b{color:#2ee0c8;font-weight:900}
.dayDot.recovery{background:#9ec3a8;border-color:#9ec3a8;box-shadow:0 0 8px rgba(158,195,168,.45)}

.rec-session .target{color:#9ec3a8}
.rec-session .target b{font-size:13px;letter-spacing:.08em}
.rec-screen{flex:1;display:flex;flex-direction:column;gap:11px;overflow:auto;padding-bottom:14px}

.rec-jp{font-family:var(--serif);font-size:60px;color:#9ec3a8;line-height:1;text-shadow:0 0 18px rgba(158,195,168,.4);flex-shrink:0}
.rec-quote{font-family:var(--serif);font-size:15px;color:#cfe0d4;letter-spacing:.05em;line-height:1.45}
.rec-time-tag{font-family:var(--mono);font-size:9px;letter-spacing:.22em;color:#9ec3a8;text-transform:uppercase;margin-top:6px;font-weight:800}
.rec-actions{display:grid;gap:8px}

function renderDone(){let streak=computeStreak(),it=(state.history[0]&&state.history[0].intensity)||'gym',msg={hard:'Hard day cleared.',busy:'Quick session locked.',dead:'Maintenance complete.',emergency:'Streak preserved.',recovery:'Body restored.',gym:'Mission complete.'}[it]||'Done.';let overlay='';if(state.showEnergy){let pick=state.energyPick;overlay=`<div class="energy-overlay"><div class="energy-box"><h3>Energy check</h3><p>How was your energy this workout?</p><div class="energy-grid">${[1,2,3,4,5].map(n=>`<button class="energy-num ${pick===n?'on':''}" onclick="pickEnergy(${n})">${n}</button>`).join('')}</div><div class="energy-grid">${[6,7,8,9,10].map(n=>`<button class="energy-num ${pick===n?'on':''}" onclick="pickEnergy(${n})">${n}</button>`).join('')}</div><button class="life-save" onclick="saveEnergy()">Save · ${pick}/10</button></div></div>`}app.innerHTML=`<div class="done-screen"><div><div class="mark">完</div><h2>${msg}</h2><div class="streak-line">Streak <b>+1</b> · ${streak} day${streak===1?'':'s'}<br>Identity preserved.</div><button class="btn red" onclick="go('home')" style="margin-top:18px">Home</button></div></div>${overlay}`;navRender()}
function renderLife(){let today=todayKey();if(!state.lifeDraft||state.lifeDraft.date!==today){let exist=state.life.find(e=>e.date===today);state.lifeDraft=exist?{...exist}:{date:today}}let d=state.lifeDraft;let slider=(field,label,min,max,suffix,first)=>{let val=d[field]||Math.round((min+max)/2);let raw=d[field]||'';let display=raw?`${raw}${suffix||''}`:`<span style="color:var(--muted)">${val}${suffix||''}</span>`;return `<div class="slider-row${first?' first':''}"><span class="slider-label">${label}</span><span class="slider-val" id="val-${field}">${display}</span></div><input type="range" min="${min}" max="${max}" value="${val}" class="slider" oninput="document.getElementById('val-${field}').textContent=this.value+'${suffix||''}'" onchange="commitLife('${field}',this.value)">`};let feelBtns=`<button class="life-pill feel ${d.feeling==='alive'?'on':''}" onclick="pickLife('feeling','alive')">Alive</button><button class="life-pill feel okay ${d.feeling==='okay'?'on':''}" onclick="pickLife('feeling','okay')">Okay</button><button class="life-pill feel dead ${d.feeling==='dead'?'on':''}" onclick="pickLife('feeling','dead')">Dead</button>`;let strip='',c=new Date();c.setHours(0,0,0,0);for(let i=6;i>=0;i--){let day=new Date(c);day.setDate(day.getDate()-i);let k=todayKey(day),entry=state.life.find(e=>e.date===k),label=day.toLocaleDateString('en-US',{weekday:'short'})[0],cls=entry?'has':'',isToday=i===0?' today':'',val=entry?(entry.feeling==='alive'?'<b>◎</b>':entry.feeling==='okay'?'<b>○</b>':entry.feeling==='dead'?'<b>×</b>':'<b>·</b>'):'';strip+=`<div class="day ${cls}${isToday}">${val}<div>${label}</div></div>`}let saved=state.showLifeSaved?`<div class="life-prev" style="border-left:2px solid #2ee0c8;color:#2ee0c8">Saved · ${new Date().toLocaleTimeString()}</div>`:'';app.innerHTML=`<div class="top"><button class="back" onclick="go('home')">‹ Back</button><div class="titlebar"><h2 class="section-title">Life Log</h2><div class="section-sub">心の記録</div></div><span></span></div><div class="life-screen"><div class="life-section card"><h3>Feeling</h3><div class="life-pills three">${feelBtns}</div></div><div class="life-section card"><h3>How are you today?</h3>${slider('energy','Energy',1,10,'/10',true)}${slider('mood','Mood',1,10,'/10')}${slider('work','Work tiredness',1,10,'/10')}${slider('sleep','Sleep',4,12,'h')}</div><div class="life-section card"><h3>Did today</h3><div class="life-pills two"><button class="life-pill ${d.japanese?'on':''}" onclick="toggleLife('japanese')">日本語</button><button class="life-pill ${d.drew?'on':''}" onclick="toggleLife('drew')">Draw / Design</button></div></div>${saved}<button class="life-save" onclick="saveLifeEntry()">Save today's entry</button><div class="life-section card"><h3>Last 7 days</h3><div class="life-strip">${strip}</div></div><div class="life-section card"><h3>Recent logs · ${state.life.length}</h3><div class="log-list">${state.life.length?state.life.slice(0,40).map(e=>{let dt=new Date(e.date+'T00:00:00'),tnow=new Date();tnow.setHours(0,0,0,0);let diff=Math.round((tnow-dt)/86400000),dlabel=diff===0?'Today':diff===1?'Yesterday':dt.toLocaleDateString('en-US',{weekday:'short'}).toUpperCase(),iso=e.date.slice(5);let feel=e.feeling?`<span class="feel-tag ${e.feeling}">${e.feeling}</span>`:'';let stats='';if(e.energy)stats+=`<span class="stat ${e.energy<=4?'hot':e.energy>=8?'good':''}">E${e.energy}</span>`;if(e.mood)stats+=`<span class="stat ${e.mood<=4?'hot':e.mood>=8?'good':''}">M${e.mood}</span>`;if(e.work)stats+=`<span class="stat ${e.work>=8?'hot':e.work<=3?'good':''}">W${e.work}</span>`;if(e.sleep)stats+=`<span class="stat ${e.sleep<6?'hot':e.sleep>=8?'good':''}">${e.sleep}h</span>`;let did='';if(e.japanese)did+='<span class="stat good">日</span>';if(e.drew)did+='<span class="stat good">✎</span>';return `<div class="log-entry${diff===0?' today':''}"><div class="log-head"><span class="date">${dlabel}<small>${iso}</small></span>${feel}</div><div class="log-body">${stats}${did}</div></div>`}).join(''):'<div class="log-empty">No entries yet · save your first day above</div>'}</div></div></div>`;navRender()}
function render(){if(state.screen==='home')renderHome();else if(state.screen==='plan')renderPlan();else if(state.screen==='focus')renderFocus();else if(state.screen==='history')renderHistory();else if(state.screen==='stats')renderStats();else if(state.screen==='done')renderDone();else if(state.screen==='recovery')renderRecovery();else if(state.screen==='life')renderLife()}function touchStart(e){touchX=e.changedTouches[0].clientX;touchY=e.changedTouches[0].clientY}function touchEnd(e){let dx=e.changedTouches[0].clientX-touchX,dy=e.changedTouches[0].clientY-touchY;if(Math.abs(dx)>55&&Math.abs(dx)>Math.abs(dy)*1.4){dx<0?moveFocus(1):moveFocus(-1)}}
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible'&&state.screen==='focus')lock()});document.addEventListener('touchstart',()=>{if(!audioCtx)beep(1,.001,.001)},{once:true});render();
if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('./sw.js').catch(()=>{})})}
</script>
</body>
